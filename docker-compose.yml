services:
  shikkanime-db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: "mysecretpassword"
      POSTGRES_USER: postgres
      POSTGRES_DB: shikkanime
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
  shikkanime-valkey:
    image: valkey/valkey:9-alpine
    restart: always
  shikkanime-core:
    build:
        context: .
    ports:
      - "37100:37100"
    restart: on-failure
    depends_on:
      shikkanime-db:
        condition: service_healthy
      shikkanime-valkey:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://shikkanime-db:5432/shikkanime
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: "mysecretpassword"
      JWT_SECRET: "mysecretkey"
      JWT_DOMAIN: "http://localhost:37100"
      JWT_REALM: "Access to '/admin'"
      JWT_AUDIENCE: "http://localhost:37100/admin"
      BASE_URL: "http://localhost:37100"
      API_URL: "http://localhost:37100/api"
      VALKEY_HOST: "shikkanime-valkey"
    healthcheck:
      test: curl --fail http://localhost:37100/ || exit 1
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 30s