name: Development Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [master]

jobs:
  test-compose:
    name: Test docker image (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Dependencies
        uses: ./.github/actions/setup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        run: gradle clean installDist -x test

      - name: Build docker image
        run: docker compose build shikkanime-core

      - name: Inspect Widevine installation (ARM)
        if: matrix.platform == 'ubuntu-24.04-arm'
        run: |
          echo "=== Widevine files in image ==="
          docker compose run --rm --no-deps --entrypoint sh shikkanime-core -lc '
            find /opt/playwright -path "*/WidevineCdm/manifest.json" -o -path "*/WidevineCdm/_platform_specific/linux_arm64/libwidevinecdm.so" -o -path "*/WidevineCdm/_platform_specific/linux_x64/libwidevinecdm.so" | sort
          '

      - name: Start services
        run: docker compose up -d --wait

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== CONTAINER STATUS ==="
          docker compose ps -a
          echo "=== CONTAINER LOGS ==="
          docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down