name: update-credentials

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      apk_vername: ${{ steps.apk_info.outputs.apk_vername }}
      apk_vercode: ${{ steps.apk_info.outputs.apk_vercode }}
      apk_download_path: ${{ steps.apk_info.outputs.apk_download_path }}
      new_version: ${{ steps.version_check.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest apk information
        id: apk_info
        run: |
          # endpoints extracted from https://github.com/vitalygashkov/crextractor
          apk_id="$(curl -X GET -s 'https://ws2-cache.aptoide.com/api/7/apps/search?query=crunchyroll&cdn=web&q=bXlDUFU9YXJtNjQtdjhhLGFybWVhYmktdjdhLGFybWVhYmkmbGVhbmJhY2s9MA&aab=1' | jq '.datalist.list.[0].id')"

          if [[ -z "$apk_id" ]]; then
            echo "Failed to fetch apk id"
            exit 1
          fi

          apk_info="$(curl -X POST -s -d "identif=id%3A$apk_id&mode=json" https://webservices.aptoide.com/webservices/3/getApkInfo | jq .apk)"
          apk_vername=$(echo "$apk_info" | jq --raw-output .vername)
          apk_vercode=$(echo "$apk_info" | jq --raw-output .vercode)
          apk_download_path=$(echo "$apk_info" | jq --raw-output .path)

          echo "apk_vername=$apk_vername" >> $GITHUB_OUTPUT
          echo "apk_vercode=$apk_vercode" >> $GITHUB_OUTPUT
          echo "apk_download_path=$apk_download_path" >> $GITHUB_OUTPUT

      - name: Get current APK version from source
        id: source_info
        run: |
          source_version=$(grep -oP '(?<=CRUNCHYROLL_APK_VERSION = ").+(?=")' src/main/kotlin/fr/shikkanime/wrappers/factories/AbstractCrunchyrollWrapper.kt)
          echo "source_version=$source_version" >> $GITHUB_OUTPUT

      - name: Compare version
        id: version_check
        run: |
          if [ "${{ steps.apk_info.outputs.apk_vername }}_${{ steps.apk_info.outputs.apk_vercode }}" = "${{ steps.source_info.outputs.source_version }}" ]; then
            echo "APK version is the same, nothing to do"
            exit 0
          fi
          echo "Newer APK version found"
          echo "new_version=true" >> $GITHUB_OUTPUT

  update-credentials:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.new_version == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jadx
        run: |
          JADX_VERSION=$(curl -s "https://api.github.com/repos/skylot/jadx/releases/latest" | grep -Po '"tag_name": "v\K[0-9.]+')

          curl -L -o jadx.zip "https://github.com/skylot/jadx/releases/download/v$JADX_VERSION/jadx-$JADX_VERSION.zip"
          unzip jadx.zip -d jadx
          chmod +x "$(pwd)/jadx/bin/jadx"

          echo "$(pwd)/jadx/bin" >> $GITHUB_PATH

      - name: Download new apk
        run: |
          curl -o crunchyroll-tv.apk "${{ needs.check-version.outputs.apk_download_path }}"

      - name: Extract apk credentials
        id: credentials
        run: |
          credentials="$(curl -s https://raw.githubusercontent.com/crunchy-labs/crunchyroll-scripts/refs/heads/master/apk-credentials-extract.sh | bash -s crunchyroll-tv.apk --info-stderr)"
          apk_basic_auth_token="$(echo "$credentials" | grep -oP '(?<=basic auth credentials: ).+')"

          echo "apk_basic_auth_token=$apk_basic_auth_token" >> $GITHUB_OUTPUT

      - name: Update source
        run: |
          new_token="${{ steps.credentials.outputs.apk_basic_auth_token }}"
          new_version="${{ needs.check-version.outputs.apk_vername }}_${{ needs.check-version.outputs.apk_vercode }}"
          source_file="src/main/kotlin/fr/shikkanime/wrappers/factories/AbstractCrunchyrollWrapper.kt"

          sed -i -E "s|(CRUNCHYROLL_BASIC_AUTH_TOKEN_DEFAULT = \").+(\")|\1${new_token}\2|g" "$source_file"
          sed -i -E "s|(CRUNCHYROLL_APK_VERSION = \").+(\")|\1${new_version}\2|g" "$source_file"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            src/main/kotlin/fr/shikkanime/wrappers/factories/AbstractCrunchyrollWrapper.kt
          commit-message: "[update-credentials action] Update Crunchyroll basic auth token"
          title: "Update Crunchyroll basic auth token"
          body: |
            Update the Crunchyroll basic auth token default value to match the latest Android TV APK (`${{ needs.check-version.outputs.apk_vername }}_${{ needs.check-version.outputs.apk_vercode }}`).

            The token can also be overridden at runtime via the `crunchyroll_basic_auth_token` configuration key without requiring a deployment.
          base: master
          branch: update-crunchyroll-credentials-${{ needs.check-version.outputs.apk_vername }}_${{ needs.check-version.outputs.apk_vercode }}
