name: Staging workflow

on:
  workflow_dispatch:  # Allows manual triggering

env:
  REGISTRY_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/shikkanime-core
  TAG: staging

jobs:
  test:
    name: Test staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Dependencies
        uses: ./.github/actions/setup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Start valkey
        run: docker run -d --name valkey -p 6379:6379 valkey/valkey:8.1-alpine

      - name: Build and test
        run: ./gradlew clean test --info

  docker:
    name: Build and push staging Docker image
    runs-on: ubuntu-latest
    needs: [ test ]
    steps:
      - uses: actions/checkout@v7

      - name: Pull latest commits
        run: git pull

      - name: Setup Dependencies
        uses: ./.github/actions/setup

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Update build.gradle.kts
        run: |
          sed -i 's|osdetector.classifier|"linux-aarch_64"|g' build.gradle.kts

      - name: Build
        run: gradle clean installDist

      - name: Build docker file
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY_IMAGE }}:${{ env.TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-staging
          cache-to: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-staging,mode=max
          push: true
